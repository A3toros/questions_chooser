[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["ws"]

[dev]
  command = "npm run dev:vite"
  targetPort = 5175
  port = 8888
  framework = "#custom"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — only when no static file exists (do NOT use force: breaks /assets/*.js)
[[context.production.redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[context.deploy-preview.redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[context.branch-deploy.redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
